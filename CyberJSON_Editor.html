<script>
(() => {

const WANTED = new Set([401,402,102,'401','402','102']);
let rawJson=null;
let targets=[];
let originalFileName='data.json';

const eventsEl=document.getElementById('events');
const fileInput=document.getElementById('fileInput');
const dropzone=document.getElementById('dropzone');
const filenameEl=document.getElementById('filename');
const summaryEl=document.getElementById('summary');
const scrollBar=document.querySelector('#scroll-indicator .bar');
const scrollPercent=document.getElementById('scroll-percent');

function cleanText(t){
  return t
   // .replace(/\\c\[\d+\]/gi,'')
   // .replace(/[{}]/g,'')
   // .replace(/\\\\/g,'\\')
   // .replace(/\\[A-Za-z]+\[\d*\]/g,'')
   // .replace(/[()]/g,'')
   // .replace(/(\\\.)+/g,'')
    .trim();
}

function walk(json){
  if(Array.isArray(json)){
    json.forEach(walk);
  }else if(json && typeof json==='object'){
    if(WANTED.has(json.code) && json.parameters){
      if(json.code==102 && Array.isArray(json.parameters[0])){
        json.parameters[0].forEach((c,i)=>{
          targets.push({obj:json,idx:i,code:102});
        });
      }
      if((json.code==401||json.code==402) && typeof json.parameters[0]==='string'){
        targets.push({obj:json,idx:0,code:json.code});
      }
    }
    Object.values(json).forEach(walk);
  }
}

function render(){
  eventsEl.innerHTML='';
  targets.forEach((t,i)=>{
    let text='';
    if(t.code==102){
      text=t.obj.parameters[0][t.idx];
    }else{
      text=t.obj.parameters[0];
    }
    const div=document.createElement('div');
    div.className='event';
    div.innerHTML=`
      <div class="badge">${t.code}</div>
      <div style="flex:1">
        <div class="preview">${text}</div>
        <textarea data-i="${i}">${cleanText(text)}</textarea>
      </div>`;
    eventsEl.appendChild(div);
  });
  summaryEl.textContent=targets.length+' item';
  updateScroll();
}

eventsEl.addEventListener('input',e=>{
  if(e.target.tagName!=='TEXTAREA')return;
  const t=targets[e.target.dataset.i];
  if(t.code==102){
    t.obj.parameters[0][t.idx]=e.target.value;
  }else{
    t.obj.parameters[0]=e.target.value;
  }
});

function updateScroll(){
  const h=eventsEl.scrollHeight-eventsEl.clientHeight;
  const p=h?eventsEl.scrollTop/h*100:0;
  scrollBar.style.height=p+'%';
  scrollPercent.textContent=Math.round(p)+'%';
}
eventsEl.addEventListener('scroll',updateScroll);

dropzone.onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f)return;
  originalFileName=f.name;        // FIX NAMA FILE
  const r=new FileReader();
  r.onload=()=>{
    rawJson=JSON.parse(r.result);
    targets=[];
    filenameEl.textContent=f.name;
    walk(rawJson);
    render();
  };
  r.readAsText(f);
};

  // download/save
  document.getElementById('saveBtn').onclick = ()=>{
  if(!rawJson){
    alert('Belum ada file');
    return;
  }

  const blob = new Blob(
    [JSON.stringify(rawJson, null, 2)],
    { type: 'application/json' }
  );

  const name =
    (originalFileName.replace(/\.json$/i,'') || 'data')
    + '-id.json';

  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = name;

  document.body.appendChild(link);
  link.click();
  link.remove();

  setTimeout(()=>{
    URL.revokeObjectURL(link.href);
  }, 5000);
};
 

})();

</script>
